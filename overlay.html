<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recent Events</title>
    <link rel="stylesheet" href="style.css" type="text/css">

    <script>
        // Extract and decode settings directly from the URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const encodedConfig = urlParams.get('cfg');

        if (encodedConfig) {
            try {
                const jsonString = decodeURIComponent(atob(encodedConfig));
                const CUSTOM_SETTINGS = JSON.parse(jsonString);

                const root = document.documentElement;
                root.style.setProperty('--font-family', CUSTOM_SETTINGS.fontFamily);
                root.style.setProperty('--font-size', CUSTOM_SETTINGS.fontSize + 'px');
                root.style.setProperty('--font-weight', CUSTOM_SETTINGS.fontWeight);
                root.style.setProperty('--font-style', CUSTOM_SETTINGS.fontStyle);
                root.style.setProperty('--text-decoration', CUSTOM_SETTINGS.textDecoration);
                root.style.setProperty('--kerning', CUSTOM_SETTINGS.kerning + 'px');

                root.style.setProperty('--text-color', CUSTOM_SETTINGS.textColor);
                root.style.setProperty('--label-color', CUSTOM_SETTINGS.labelColor);
                root.style.setProperty('--text-shadow', `${CUSTOM_SETTINGS.shadowX}px ${CUSTOM_SETTINGS.shadowY}px ${CUSTOM_SETTINGS.shadowBlur}px ${CUSTOM_SETTINGS.shadowColor}`);

                root.style.setProperty('--padding', CUSTOM_SETTINGS.padding + 'px');

                if (CUSTOM_SETTINGS.layout === 'horizontal') {
                    root.style.setProperty('--layout-display', 'flex');
                    root.style.setProperty('--layout-gap', CUSTOM_SETTINGS.spacing + 'px');
                    document.write('<style>.event-container { margin: 0; }</style>');
                } else {
                    root.style.setProperty('--spacing', CUSTOM_SETTINGS.spacing + 'px');
                }
            } catch (e) {
                console.error("Failed to parse overlay settings from URL:", e);
            }
        } else {
            console.warn("No configuration found in URL. Using default CSS styles.");
        }
    </script>

    <script src="config.js"></script>
    <script src="app.js"></script>
</head>
<body>
    <div class="event-container" id="latest-follow">
        <span class="label">Latest Follower:</span> <span class="value">-</span>
    </div>
    <div class="event-container" id="latest-subscribe">
        <span class="label">Latest Sub:</span> <span class="value">-</span>
    </div>
    <div class="event-container" id="latest-cheer">
        <span class="label">Latest Cheer:</span> <span class="value">-</span>
    </div>
</body>
</html>
